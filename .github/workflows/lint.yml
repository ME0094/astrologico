name: Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install black flake8 pylint isort mypy

    - name: Check import sorting
      run: |
        echo "📚 Checking import ordering..."
        isort --check-only . --skip venv --skip .git --skip .github

    - name: Format check with Black
      run: |
        echo "🎨 Checking code formatting with Black..."
        black --check . --exclude venv

    - name: Lint with Flake8
      run: |
        echo "🔍 Running Flake8 linter..."
        flake8 . --max-line-length=120 --exclude venv,.git,.github,__pycache__ --count --statistics

    - name: Type checking with MyPy
      run: |
        echo "📝 Running MyPy type checker..."
        mypy . --ignore-missing-imports --skip-missing-imports || true

    - name: Lint with Pylint
      run: |
        echo "🔎 Running Pylint..."
        pip install -r requirements.txt
        pylint **/*.py --disable=all --enable=E,F,W,C0114,C0115,C0116 --fail-under=8.0 --exit-zero || true
