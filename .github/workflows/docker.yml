name: Docker Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: false
        tags: me0094/astrologico:latest
        file: ./Dockerfile
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Test Docker image
      run: |
        echo "🐳 Building Docker image for testing..."
        docker build -t astrologico-test:latest -f Dockerfile .
        
        echo "✅ Testing Docker container startup..."
        docker run --rm -e AI_PROVIDER=openai astrologico-test:latest python -c "from astrologico import AstrologicalCalculator; calc = AstrologicalCalculator(); print('✓ Import successful')" || echo "Warning: API keys not configured for full test"
        
        echo "✅ Docker image build successful!"

    - name: Upload Docker image artifact
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v3
      with:
        name: docker-image
        path: Dockerfile
        retention-days: 30
