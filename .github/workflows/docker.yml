name: Docker Build and Push

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, develop ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to Container Registry
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v2
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Log in to Docker Hub
      if: github.event_name != 'pull_request' && secrets.DOCKER_USERNAME != ''
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v4
      with:
        images: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          ${{ secrets.DOCKER_USERNAME != '' && format('docker.io/{0}/astrologico', secrets.DOCKER_USERNAME) || '' }}
        tags: |
          type=ref,event=branch
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./Dockerfile
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Test Docker image (Pull Request)
      if: github.event_name == 'pull_request'
      run: |
        docker build -t astrologico-test:latest -f Dockerfile .
        
        # Test imports
        docker run --rm astrologico-test:latest python -c \
          "from src.astrologico.core import AstrologicalCalculator; print('✓ Core module imports successfully')"
        
        docker run --rm astrologico-test:latest python -c \
          "from src.astrologico.api import create_app; app = create_app(); print('✓ API application created successfully')"
        
        echo "✅ Docker image validation successful!"

    - name: Run container health check (main branch)
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        echo "🐳 Starting container for health check..."
        docker run -d \
          --name astrologico-healthcheck \
          -e ASTROLOGICO_ENV=testing \
          -p 8000:8000 \
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        
        sleep 10
        
        echo "✅ Container started, checking health endpoint..."
        curl -f http://localhost:8000/api/status/health || \
          { echo "❌ Health check failed"; docker logs astrologico-healthcheck; exit 1; }
        
        docker stop astrologico-healthcheck
        echo "✅ Health check passed!"

    - name: Upload Docker artifact
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v3
      with:
        name: docker-image
        path: |
          Dockerfile
          docker-compose.yml
        retention-days: 30
