name: Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run security scan daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install bandit safety black flake8

    - name: Run Bandit security scan
      run: |
        echo "🔒 Running Bandit security scan..."
        bandit -r . -ll -i --exclude venv,tests,.github -f json -o bandit-report.json || true
        bandit -r . -ll -i --exclude venv,tests,.github

    - name: Run Safety vulnerability check
      run: |
        echo "📦 Checking for known vulnerabilities in dependencies..."
        safety check --json || true
        safety check

    - name: Run code quality checks
      run: |
        echo "✨ Running code quality checks..."
        black --check . --exclude venv || true
        flake8 . --max-line-length=120 --exclude venv,tests,.github || true

    - name: Check for hardcoded secrets
      run: |
        echo "🔑 Scanning for hardcoded secrets..."
        pip install detect-secrets
        detect-secrets scan --baseline .secrets.baseline || echo "No baseline found, creating one..."
        detect-secrets scan || echo "Scan complete"

    - name: Upload security reports
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: security-reports
        path: bandit-report.json
        retention-days: 30
